name: AI Review
on:
  pull_request: { types: [opened, synchronize, reopened] }
  issue_comment: { types: [created] }
  # Dev RESPONDE uma thread inline -> judge-pushback avalia o argumento (fecha P1/P2 se valido).
  pull_request_review_comment: { types: [created] }
# Declarar permissions explicitamente: a org desabilita write por default no
# GITHUB_TOKEN, e o reusable precisa postar review (pull-requests) + check run (checks).
permissions:
  contents: read
  pull-requests: write
  checks: write
jobs:
  call:
    # FIX P0-seguranca: o branch issue_comment roda com `secrets: inherit` (todos os
    # org secrets). Sem guard, qualquer um que abra um PR de fork poderia comentar
    # /ai-review e disparar o pipeline com LLM_API_KEY/REVIEW_APP_PRIVATE_KEY/REVIEW_PAT/
    # JIRA_API_TOKEN. Exigimos que o comentario seja em um PR (nao issue) E que o autor
    # seja membro do repo (OWNER/MEMBER/COLLABORATOR) — author_association de fork e
    # CONTRIBUTOR/NONE/FIRST_TIME_*. O branch pull_request permanece normal.
    # PED-2728: `/ai-review dismiss|undismiss` NAO cai aqui (job dismiss cuida) — senao o
    # pipeline rodaria em duplicidade. As negacoes isolam o sub-comando.
    if: >-
      github.event_name == 'pull_request' ||
      (startsWith(github.event.comment.body, '/ai-review') &&
       !startsWith(github.event.comment.body, '/ai-review dismiss') &&
       !startsWith(github.event.comment.body, '/ai-review undismiss') &&
       github.event.issue.pull_request &&
       contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    uses: freeflowsoftware/movvia-ai-review/.github/workflows/ai-review.yml@v1
    with:
      pr_number: ${{ github.event.pull_request.number || github.event.issue.number }}
      full_review: ${{ contains(github.event.comment.body, '--full') }}
    secrets: inherit

  dismiss:
    # PED-2728: /ai-review dismiss|undismiss <findingId> <motivo>. Mesmo fork-guard do call.
    # Roda o pipeline com event=dismiss: o job post aplica lib/dismiss.ts ANTES do post.ts.
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      (startsWith(github.event.comment.body, '/ai-review dismiss') ||
       startsWith(github.event.comment.body, '/ai-review undismiss')) &&
      contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    uses: freeflowsoftware/movvia-ai-review/.github/workflows/ai-review.yml@v1
    with:
      pr_number: ${{ github.event.issue.number }}
      event: dismiss
      comment_id: ${{ github.event.comment.id }}
    secrets: inherit

  judge:
    # Dispara so quando o dev RESPONDE uma thread inline (in_reply_to_id presente). Mesmo
    # fork-guard do call (membro do repo). Anti-loop PRIMARIO: ignora replies que contem
    # nosso marker (o reply do PROPRIO bot tambem dispara este evento) — o shouldJudge no
    # entrypoint reforca por identidade. So o judge-pushback roda (pipeline fica skipped).
    if: >-
      github.event_name == 'pull_request_review_comment' &&
      github.event.comment.in_reply_to_id &&
      contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
      !contains(github.event.comment.body, 'movvia-ai-review:')
    uses: freeflowsoftware/movvia-ai-review/.github/workflows/ai-review.yml@v1
    with:
      pr_number: ${{ github.event.pull_request.number }}
      event: review_comment
      comment_id: ${{ github.event.comment.id }}
    secrets: inherit
