name: AI Code Review (central)
on:
  workflow_call:
    inputs:
      pr_number:   { type: number, required: true }
      agents_dir:  { type: string, default: "agents" }
      full_review: { type: boolean, default: false }
    secrets:
      LLM_API_KEY:            { required: true }
      LLM_BASE_URL:           { required: false }
      # App opcional: sem ele, o post cai no GITHUB_TOKEN nativo e o review vira
      # COMMENT (o veredicto fica no check run). Para travar merge via Ruleset com
      # integration_id, configure o GitHub App e registre estes 3 secrets.
      REVIEW_APP_ID:          { required: false }
      REVIEW_APP_PRIVATE_KEY: { required: false }
      REVIEW_INSTALLATION_ID: { required: false }
      REVIEW_PAT:             { required: false }
      JIRA_BASE_URL:          { required: false }
      JIRA_EMAIL:             { required: false }
      JIRA_API_TOKEN:         { required: false }
permissions:
  contents: read
  pull-requests: write
  checks: write
jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with: { repository: freeflowsoftware/movvia-ai-review, ref: v1, path: _review }
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: cd _review && npm i -g pnpm@9 && pnpm install --prod=false
      - name: Gate Jira
        env:
          GH_TOKEN: ${{ github.token }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          TITLE=$(gh pr view ${{ inputs.pr_number }} --json title -q .title)
          cd _review && npx tsx lib/jira.ts "$TITLE"
      - name: Gate ADR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr view ${{ inputs.pr_number }} --json body -q .body > /tmp/body.txt
          export PR_BODY="$(cat /tmp/body.txt)"
          gh pr diff ${{ inputs.pr_number }} --name-only | (cd _review && npx tsx lib/adr.ts)
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with: { repository: freeflowsoftware/movvia-ai-review, ref: v1 }
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm i -g pnpm@9 && pnpm install
      - id: set
        run: echo "matrix=$(npx tsx lib/discover.ts ${{ inputs.agents_dir }})" >> "$GITHUB_OUTPUT"
  review:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - name: Checkout repo alvo
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Checkout central
        uses: actions/checkout@v4
        with: { repository: freeflowsoftware/movvia-ai-review, ref: v1, path: _review }
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: cd _review && npm i -g pnpm@9 && pnpm install
      - name: Instalar opencode
        run: npm i -g opencode-ai || true
      - name: Capturar diff e titulo
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr diff ${{ inputs.pr_number }} > /tmp/pr.diff
          gh pr view ${{ inputs.pr_number }} --json title -q .title > /tmp/pr-title.txt
      - name: Rodar agente ${{ matrix.name }}
        env:
          # O opencode lê o provider OpenAI-compatible de _review/opencode.json (cwd do
          # passo) e resolve a credencial via {env:LLM_API_KEY}/{env:LLM_BASE_URL}.
          # LLM_BASE_URL é secret opcional; default = endpoint OpenAI-compat do Gemini.
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL || 'https://generativelanguage.googleapis.com/v1beta/openai' }}
          AGENT_NAME: ${{ matrix.name }}
          AGENT_MODEL: ${{ matrix.model }}
          # FIX F6: o agente de requisitos precisa da US do Jira. PR_TITLE alimenta a
          # extracao da chave (lib/jira.ts) e os secrets Jira liberam a busca do contexto.
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          export PR_TITLE="$(cat /tmp/pr-title.txt)"
          cd _review && npx tsx lib/agent-runner-cli.ts "$AGENT_NAME" "$GITHUB_WORKSPACE" /tmp/pr.diff > "/tmp/findings-${AGENT_NAME}.json"
      - uses: actions/upload-artifact@v4
        with: { name: "findings-${{ matrix.name }}", path: "/tmp/findings-${{ matrix.name }}.json" }
  gatekeeper:
    needs: review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { repository: freeflowsoftware/movvia-ai-review, ref: v1 }
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm i -g pnpm@9 && pnpm install
      - name: Instalar opencode
        run: npm i -g opencode-ai || true
      - uses: actions/download-artifact@v4
        with: { path: /tmp/findings, pattern: "findings-*", merge-multiple: true }
      - name: Capturar diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr diff ${{ inputs.pr_number }} > /tmp/pr.diff
      - name: Consolidar
        env:
          # A etapa adversarial do gatekeeper tambem invoca o opencode (runAdversarial →
          # realOpencodeRunner). opencode.json esta no cwd (raiz do repo central, checkout
          # acima) e resolve a credencial via {env:LLM_API_KEY}/{env:LLM_BASE_URL}.
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL || 'https://generativelanguage.googleapis.com/v1beta/openai' }}
        run: npx tsx lib/gatekeeper.ts /tmp/findings /tmp/pr.diff > /tmp/verdict.json
      - uses: actions/upload-artifact@v4
        with: { name: verdict, path: /tmp/verdict.json }
  post:
    needs: gatekeeper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { repository: freeflowsoftware/movvia-ai-review, ref: v1 }
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm i -g pnpm@9 && pnpm install
      - uses: actions/download-artifact@v4
        with: { name: verdict, path: /tmp }
      - name: Postar review + check run
        env:
          REVIEW_APP_ID: ${{ secrets.REVIEW_APP_ID }}
          REVIEW_APP_PRIVATE_KEY: ${{ secrets.REVIEW_APP_PRIVATE_KEY }}
          REVIEW_INSTALLATION_ID: ${{ secrets.REVIEW_INSTALLATION_ID }}
          REVIEW_PAT: ${{ secrets.REVIEW_PAT }}
          # Fallback de identidade quando nao ha App/PAT: o token nativo do Actions
          # posta comentario/inline/check run (review vira COMMENT). permissions ja
          # concedem pull-requests:write + checks:write.
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          GH_REPO: ${{ github.repository }}
        run: npx tsx lib/post.ts /tmp/verdict.json
