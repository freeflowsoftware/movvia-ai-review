name: AI Code Review (central)
on:
  workflow_call:
    inputs:
      pr_number:   { type: number, required: true }
      agents_dir:  { type: string, default: "agents" }
      full_review: { type: boolean, default: false }
      # event = 'pull_request' (pipeline completo) | 'review_comment' (judge-pushback) |
      # 'dismiss' (PED-2728: roda o pipeline completo E aplica /ai-review dismiss no job post
      # ANTES do post.ts, que rele o store e recomputa o verdict). comment_id e usado quando
      # event='review_comment' (id do reply do dev) ou event='dismiss' (id do comando).
      event:       { type: string, default: "pull_request" }
      comment_id:  { type: string, required: false }
    secrets:
      LLM_API_KEY:            { required: true }
      LLM_BASE_URL:           { required: false }
      # App opcional: sem ele, o post cai no GITHUB_TOKEN nativo e o review vira
      # COMMENT (o veredicto fica no check run). Para travar merge via Ruleset com
      # integration_id, configure o GitHub App e registre estes 3 secrets.
      REVIEW_APP_ID:          { required: false }
      REVIEW_APP_PRIVATE_KEY: { required: false }
      REVIEW_INSTALLATION_ID: { required: false }
      REVIEW_PAT:             { required: false }
      JIRA_BASE_URL:          { required: false }
      JIRA_EMAIL:             { required: false }
      JIRA_API_TOKEN:         { required: false }
      # Token com Contents:read no repo central (privado) para os checkouts cross-repo
      # a partir de OUTRO repo (pe-*). No dogfooding o github.token basta (mesmo repo);
      # de fora, o GITHUB_TOKEN do chamador nao acessa o privado. O App token (instalado
      # em ambos) substitui isto quando o GitHub App existir.
      AI_REVIEW_REPO_TOKEN:   { required: false }
permissions:
  contents: read
  pull-requests: write
  checks: write
# Grupo COMPARTILHADO por PR (sem o event): pipeline (push) e judge-pushback (review_comment)
# do MESMO PR caem no mesmo group e SERIALIZAM as escritas do comentario withdrawals e das
# threads (read-modify-write nao e atomico no GitHub). cancel-in-progress: false para NAO
# matar um julgamento/pipeline em curso — enfileira. O verificador le sempre o head atual
# via getFileAtRef no SHA, entao run enfileirado nao age contra estado obsoleto.
concurrency:
  group: movvia-ai-review-pr-${{ inputs.pr_number }}
  cancel-in-progress: false
jobs:
  gates:
    # Pipeline completo so no evento de PR; no review_comment quem roda e o judge-pushback.
    if: inputs.event != 'review_comment'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: freeflowsoftware/movvia-ai-review
          ref: v1
          path: _review
          token: ${{ secrets.AI_REVIEW_REPO_TOKEN || github.token }}
      # pnpm/action-setup ANTES do setup-node: o cache do setup-node precisa do pnpm
      # ja no PATH para resolver o store. cache-dependency-path aponta para o lockfile
      # do checkout central (_review), que e quem tem as deps deste job.
      # npm i -g pnpm (nao pnpm/action-setup): em jobs que fazem checkout do repo ALVO
      # no cwd, o action-setup le o package.json do alvo (que pode ter packageManager:
      # pnpm@x) e conflita com a versao fixada -> "Multiple versions of pnpm specified".
      - run: npm i -g pnpm@9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: _review/pnpm-lock.yaml
      # --ignore-workspace: quando o repo ALVO e um workspace pnpm (ex: pe-portais),
      # o pnpm sobe diretorios a partir de _review, encontra o pnpm-workspace.yaml do
      # alvo e instala as deps DO ALVO em vez das do _review -> ERR_MODULE_NOT_FOUND
      # (yaml, minimatch) em gates/context-pack. O flag trata _review como standalone.
      - run: cd _review && pnpm install --prefer-offline --ignore-workspace
      - name: Gate Jira
        env:
          GH_TOKEN: ${{ github.token }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          TITLE=$(gh pr view ${{ inputs.pr_number }} --json title -q .title)
          cd _review && npx tsx lib/jira.ts "$TITLE"
      - name: Gate ADR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr view ${{ inputs.pr_number }} --json body -q .body > /tmp/body.txt
          export PR_BODY="$(cat /tmp/body.txt)"
          gh pr diff ${{ inputs.pr_number }} --name-only | (cd _review && npx tsx lib/adr.ts)
  discover:
    # Raiz da cadeia discover->context-pack->review->gatekeeper->post: skipped aqui
    # propaga o skip aos dependentes (needs de job skipped nao roda) no review_comment.
    if: inputs.event != 'review_comment'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: freeflowsoftware/movvia-ai-review
          ref: v1
          token: ${{ secrets.AI_REVIEW_REPO_TOKEN || github.token }}
      # Checkout do central NO CWD: o lockfile com as deps fica na raiz, entao
      # cache-dependency-path e o pnpm install rodam no cwd (sem cd _review).
      # npm i -g pnpm (nao pnpm/action-setup): em jobs que fazem checkout do repo ALVO
      # no cwd, o action-setup le o package.json do alvo (que pode ter packageManager:
      # pnpm@x) e conflita com a versao fixada -> "Multiple versions of pnpm specified".
      - run: npm i -g pnpm@9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --prefer-offline
      - id: set
        run: echo "matrix=$(npx tsx lib/discover.ts ${{ inputs.agents_dir }})" >> "$GITHUB_OUTPUT"
  # Fase 1c: gera o context-pack determinístico (lib/context-pack.ts) UMA vez por PR e o publica
  # como artefato. Roda em job proprio (nao na matrix de review) para nao recalcular o pack N
  # vezes — todos os agentes da matrix consomem o mesmo artefato baixado no job review.
  context-pack:
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      # Checkout do repo ALVO no cwd com fetch-depth:0: o context-pack le arquivos inteiros,
      # irmaos e imports do codebase real (nao so o diff), entao precisa da arvore completa.
      # ref EXPLICITO no head do PR: no evento issue_comment (/ai-review) o github.ref e o
      # default branch, e o checkout sem ref leria a main — o pack entregaria os arquivos
      # SEM as mudancas do PR (agente e refuter avaliando contra codigo velho). Usamos
      # refs/pull/N/head (nao /merge): o merge ref deixa de existir quando o PR conflita.
      # persist-credentials: false — o workspace contem codigo nao-confiavel do PR; nada
      # depois do checkout usa credencial git (gh usa GH_TOKEN do env), entao nao persiste.
      - name: Checkout repo alvo
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ inputs.pr_number }}/head
          fetch-depth: 0
          persist-credentials: false
      - name: Checkout central
        uses: actions/checkout@v4
        with:
          repository: freeflowsoftware/movvia-ai-review
          ref: v1
          path: _review
          token: ${{ secrets.AI_REVIEW_REPO_TOKEN || github.token }}
          # Nao persistir o AI_REVIEW_REPO_TOKEN em _review/.git/config: o job coexiste com
          # codigo nao-confiavel do PR no workspace e nada apos o checkout usa credencial git.
          persist-credentials: false
      # As deps deste job vem do checkout central em _review (o checkout alvo no cwd nao tem
      # o lockfile do review), por isso cacheamos _review/pnpm-lock.yaml (padrao Fase 0).
      # npm i -g pnpm (nao pnpm/action-setup): em jobs que fazem checkout do repo ALVO
      # no cwd, o action-setup le o package.json do alvo (que pode ter packageManager:
      # pnpm@x) e conflita com a versao fixada -> "Multiple versions of pnpm specified".
      - run: npm i -g pnpm@9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: _review/pnpm-lock.yaml
      # --ignore-workspace: quando o repo ALVO e um workspace pnpm (ex: pe-portais),
      # o pnpm sobe diretorios a partir de _review, encontra o pnpm-workspace.yaml do
      # alvo e instala as deps DO ALVO em vez das do _review -> ERR_MODULE_NOT_FOUND
      # (yaml, minimatch) em gates/context-pack. O flag trata _review como standalone.
      - run: cd _review && pnpm install --prefer-offline --ignore-workspace
      - name: Capturar diff
        env:
          GH_TOKEN: ${{ github.token }}
          # O checkout no cwd e o repo ALVO, mas o `gh` resolve o repo pelo remote do cwd;
          # forcamos github.repository (o caller) para o `gh pr diff` apontar pro PR certo.
          GH_REPO: ${{ github.repository }}
        run: gh pr diff ${{ inputs.pr_number }} > /tmp/pr.diff
      - name: Gerar context-pack
        # context-pack-cli.ts <repoDir> <diffPath> → ContextPack JSON em stdout. repoDir e o
        # workspace do checkout alvo; o CLI le defaults.yml do central (import.meta.dirname).
        # cd _review (mesmo padrao do job review): o npx resolve binarios primeiro em
        # ./node_modules/.bin do cwd — rodar da raiz do checkout NAO-confiavel permitiria a
        # um PR malicioso commitar node_modules/.bin/tsx e executar codigo no runner.
        # O redirect usa $GITHUB_WORKSPACE porque o upload-artifact le do workspace, nao do cwd.
        run: cd _review && npx tsx lib/context-pack-cli.ts "$GITHUB_WORKSPACE" /tmp/pr.diff > "$GITHUB_WORKSPACE/context-pack.json"
      - uses: actions/upload-artifact@v4
        with: { name: context-pack, path: context-pack.json }
  # Walkthrough: corre em PARALELO com o review (ambos precisam so do context-pack).
  # Gera narrativa + tabela de camadas + diagramas Mermaid + estimativa de esforco e posta
  # como comentario top-level no PR (idempontente via marker). Independente do pipeline de
  # findings: falha aqui nao bloqueia o review nem o gatekeeper.
  walkthrough:
    needs: context-pack
    if: inputs.event != 'review_comment'
    # continue-on-error: falha no walkthrough NAO marca o run como vermelho nem bloqueia
    # o pipeline de findings (review→gatekeeper→post). O walkthrough e best-effort.
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          repository: freeflowsoftware/movvia-ai-review
          ref: v1
          token: ${{ secrets.AI_REVIEW_REPO_TOKEN || github.token }}
      # Checkout do central NO CWD: lockfile na raiz, cache e install no cwd.
      # npm i -g pnpm (nao pnpm/action-setup): em jobs que fazem checkout do repo ALVO
      # no cwd, o action-setup le o package.json do alvo (que pode ter packageManager:
      # pnpm@x) e conflita com a versao fixada -> "Multiple versions of pnpm specified".
      - run: npm i -g pnpm@9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --prefer-offline
      - uses: actions/download-artifact@v4
        with: { name: context-pack, path: /tmp/context-pack }
      - name: Capturar diff e titulo
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh pr diff ${{ inputs.pr_number }} > /tmp/pr.diff
          gh pr view ${{ inputs.pr_number }} --json title -q .title > /tmp/pr-title.txt
      - name: Gerar e postar walkthrough
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL || 'https://generativelanguage.googleapis.com/v1beta/openai' }}
          # ID OpenRouter valido. "gemini/gemini-flash-lite" dava HTTP 400 (model ID invalido).
          WALKTHROUGH_MODEL: "google/gemini-2.5-flash-lite"
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          GH_REPO: ${{ github.repository }}
        run: |
          export PR_TITLE="$(cat /tmp/pr-title.txt)"
          npx tsx lib/walkthrough-cli.ts /tmp/pr.diff /tmp/context-pack/context-pack.json > /tmp/walkthrough.json
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: walkthrough, path: /tmp/walkthrough.json }
  review:
    needs: [discover, context-pack]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      # ref explicito no head do PR pelo mesmo motivo do job context-pack: no issue_comment
      # (/ai-review) o checkout sem ref leria a main, e loadRepoRules/loadAdrs + o repoDir
      # do agente refletiriam codigo sem as mudancas do PR. persist-credentials: false
      # pelo mesmo motivo do context-pack (workspace nao-confiavel, git nao e mais usado).
      - name: Checkout repo alvo
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ inputs.pr_number }}/head
          fetch-depth: 0
          persist-credentials: false
      - name: Checkout central
        uses: actions/checkout@v4
        with:
          repository: freeflowsoftware/movvia-ai-review
          ref: v1
          path: _review
          token: ${{ secrets.AI_REVIEW_REPO_TOKEN || github.token }}
          # Mesmo motivo do context-pack: workspace nao-confiavel, git nao e usado apos o checkout.
          persist-credentials: false
      # As deps deste job vem do checkout central em _review (o checkout alvo no cwd
      # nao tem o lockfile do review), por isso cacheamos _review/pnpm-lock.yaml.
      # npm i -g pnpm (nao pnpm/action-setup): em jobs que fazem checkout do repo ALVO
      # no cwd, o action-setup le o package.json do alvo (que pode ter packageManager:
      # pnpm@x) e conflita com a versao fixada -> "Multiple versions of pnpm specified".
      - run: npm i -g pnpm@9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: _review/pnpm-lock.yaml
      # --ignore-workspace: quando o repo ALVO e um workspace pnpm (ex: pe-portais),
      # o pnpm sobe diretorios a partir de _review, encontra o pnpm-workspace.yaml do
      # alvo e instala as deps DO ALVO em vez das do _review -> ERR_MODULE_NOT_FOUND
      # (yaml, minimatch) em gates/context-pack. O flag trata _review como standalone.
      - run: cd _review && pnpm install --prefer-offline --ignore-workspace
      # Sem install do opencode: o agente faz chat-completion direta via fetch nativo
      # (realChatRunner), nao o binario opencode. O install ficaria morto.
      # Fase 1c: baixa o context-pack gerado uma vez no job context-pack. loadContextPack
      # (agent-runner-cli) filtra so as secoes dos arquivos que ESTE agente revisa.
      - uses: actions/download-artifact@v4
        with: { name: context-pack, path: /tmp/context-pack }
      - name: Capturar diff e titulo
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr diff ${{ inputs.pr_number }} > /tmp/pr.diff
          gh pr view ${{ inputs.pr_number }} --json title -q .title > /tmp/pr-title.txt
      - name: Rodar agente ${{ matrix.name }}
        env:
          # O agente faz chat-completion direta via fetch nativo (realChatRunner em
          # lib/run-agent.ts), que le a credencial direto do ambiente. Por isso exportamos
          # LLM_API_KEY/LLM_BASE_URL aqui. LLM_BASE_URL e secret opcional; o default e o
          # endpoint OpenAI-compat do Gemini.
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL || 'https://generativelanguage.googleapis.com/v1beta/openai' }}
          AGENT_NAME: ${{ matrix.name }}
          AGENT_MODEL: ${{ matrix.model }}
          # Modelo por dimensao: default = Gemini Flash-Lite (barato/rapido); agentes de
          # RACIOCINIO (seguranca/regressao/arquitetura) fixam deepseek-v4-flash no proprio
          # frontmatter. Sem DEFAULT_MODEL global de DeepSeek (que inflava o gatekeeper).
          # FIX F6: o agente de requisitos precisa da US do Jira. PR_TITLE alimenta a
          # extracao da chave (lib/jira.ts) e os secrets Jira liberam a busca do contexto.
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        # PED-2729: erro transitorio de LLM (timeout/429/5xx) ja tenta de novo dentro do
        # agent-runner-cli (withRetry); se mesmo assim falhar apos os retries, emitimos
        # anotacao ::error visivel no Summary do Actions e preservamos o exit code de falha.
        # Fail-closed: a leg da matrix falha -> o job "review" falha -> o gatekeeper (needs:
        # review) nao roda e nenhum veredicto e postado (nao ha APPROVE silencioso). A
        # contabilizacao de veredicto PARCIAL por dimensao perdida e escopo do candidato 06.
        run: |
          export PR_TITLE="$(cat /tmp/pr-title.txt)"
          cd _review && npx tsx lib/agent-runner-cli.ts "$AGENT_NAME" "$GITHUB_WORKSPACE" /tmp/pr.diff /tmp/context-pack/context-pack.json > "/tmp/findings-${AGENT_NAME}.json" || { echo "::error title=AI Review::dimensao '${AGENT_NAME}' falhou apos os retries do LLM"; exit 1; }
      - uses: actions/upload-artifact@v4
        with: { name: "findings-${{ matrix.name }}", path: "/tmp/findings-${{ matrix.name }}.json" }
  gatekeeper:
    needs: review
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          repository: freeflowsoftware/movvia-ai-review
          ref: v1
          token: ${{ secrets.AI_REVIEW_REPO_TOKEN || github.token }}
      # Checkout do central NO CWD: lockfile na raiz, cache e install no cwd.
      # npm i -g pnpm (nao pnpm/action-setup): em jobs que fazem checkout do repo ALVO
      # no cwd, o action-setup le o package.json do alvo (que pode ter packageManager:
      # pnpm@x) e conflita com a versao fixada -> "Multiple versions of pnpm specified".
      - run: npm i -g pnpm@9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --prefer-offline
      # Sem install do opencode aqui: a etapa adversarial usa chat-completion direta via
      # fetch nativo (realChatRunner), nao o binario opencode.
      - uses: actions/download-artifact@v4
        with: { path: /tmp/findings, pattern: "findings-*", merge-multiple: true }
      # Fase 2: baixa o context-pack (gerado uma vez no job context-pack) para o refuter
      # adversarial refutar com base factual — por finding, extrai o trecho do arquivo
      # (loadContextPack) e injeta no prompt do cetico. O 3o argv do gatekeeper.ts e o pack.
      - uses: actions/download-artifact@v4
        with: { name: context-pack, path: /tmp/context-pack }
      - name: Capturar diff
        env:
          GH_TOKEN: ${{ github.token }}
          # Este job so faz checkout do repo CENTRAL no cwd; sem GH_REPO o gh assume
          # o repo central e busca o PR la (404). Forcamos o repo ALVO (o caller).
          GH_REPO: ${{ github.repository }}
        run: gh pr diff ${{ inputs.pr_number }} > /tmp/pr.diff
      - name: Consolidar
        env:
          # A etapa adversarial do gatekeeper faz chat-completion direta via fetch nativo
          # (runAdversarial → realChatRunner em lib/run-agent.ts), NAO invoca mais o binario
          # opencode. realChatRunner le a credencial direto do ambiente, por isso ainda
          # exportamos LLM_API_KEY/LLM_BASE_URL aqui.
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL || 'https://generativelanguage.googleapis.com/v1beta/openai' }}
          # DEDUP_MODEL: modelo da consolidacao semantica final (consolidateFindings).
          # REFUTER_MODEL: modelo do refuter adversarial, fixado explicitamente (nao por
          # fallback) para nunca cair no Flash-Lite — o avaliador do PR #475 mostrou que o
          # refuter em Flash-Lite nao barrava falsos-positivos. Ambos em deepseek-v4-flash
          # (raciocinio); manter separados permite ajustar um sem afetar o outro.
          DEDUP_MODEL: deepseek/deepseek-v4-flash
          REFUTER_MODEL: deepseek/deepseek-v4-flash
        run: npx tsx lib/gatekeeper.ts /tmp/findings /tmp/pr.diff /tmp/context-pack/context-pack.json > /tmp/verdict.json
      - uses: actions/upload-artifact@v4
        with: { name: verdict, path: /tmp/verdict.json }
  post:
    needs: gatekeeper
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          repository: freeflowsoftware/movvia-ai-review
          ref: v1
          token: ${{ secrets.AI_REVIEW_REPO_TOKEN || github.token }}
      # Checkout do central NO CWD: lockfile na raiz, cache e install no cwd.
      # npm i -g pnpm (nao pnpm/action-setup): em jobs que fazem checkout do repo ALVO
      # no cwd, o action-setup le o package.json do alvo (que pode ter packageManager:
      # pnpm@x) e conflita com a versao fixada -> "Multiple versions of pnpm specified".
      - run: npm i -g pnpm@9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --prefer-offline
      - uses: actions/download-artifact@v4
        with: { name: verdict, path: /tmp }
      # PED-2728: quando o gatilho e o comando /ai-review dismiss, aplica-o ANTES do post.ts
      # (mesmo job = sequencial, sem corrida no read-modify-write do store). lib/dismiss.ts
      # grava o Withdrawal e o post.ts seguinte rele o store, suprime e recomputa o verdict,
      # re-emitindo review-bot/verdict. So roda no event=dismiss.
      - name: Aplicar dismiss (event=dismiss)
        if: inputs.event == 'dismiss'
        env:
          REVIEW_APP_ID: ${{ secrets.REVIEW_APP_ID }}
          REVIEW_APP_PRIVATE_KEY: ${{ secrets.REVIEW_APP_PRIVATE_KEY }}
          REVIEW_INSTALLATION_ID: ${{ secrets.REVIEW_INSTALLATION_ID }}
          REVIEW_PAT: ${{ secrets.REVIEW_PAT }}
          AI_REVIEW_REPO_TOKEN: ${{ secrets.AI_REVIEW_REPO_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          COMMENT_ID: ${{ inputs.comment_id }}
          GH_REPO: ${{ github.repository }}
          # A issue de feedback e a analise do LLM (best-effort) usam o mesmo endpoint LLM.
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL || 'https://generativelanguage.googleapis.com/v1beta/openai' }}
          FEEDBACK_MODEL: deepseek/deepseek-v4-flash
        run: npx tsx lib/dismiss.ts
      - name: Postar review + check run
        env:
          REVIEW_APP_ID: ${{ secrets.REVIEW_APP_ID }}
          REVIEW_APP_PRIVATE_KEY: ${{ secrets.REVIEW_APP_PRIVATE_KEY }}
          REVIEW_INSTALLATION_ID: ${{ secrets.REVIEW_INSTALLATION_ID }}
          REVIEW_PAT: ${{ secrets.REVIEW_PAT }}
          # PAT para o resolveOctokit que RESOLVE review threads: o GITHUB_TOKEN nativo
          # do bot NAO resolve threads (confirmado em runtime), so um PAT/App resolve.
          # post.ts usa REVIEW_PAT || AI_REVIEW_REPO_TOKEN para o listFindingThreads/resolve.
          AI_REVIEW_REPO_TOKEN: ${{ secrets.AI_REVIEW_REPO_TOKEN }}
          # Fallback de identidade quando nao ha App/PAT: o token nativo do Actions
          # posta comentario/inline/check run (review vira COMMENT). permissions ja
          # concedem pull-requests:write + checks:write. NB: o prefixo GITHUB_ e
          # reservado pelo runner (env GITHUB_TOKEN e ignorada) -> usar GH_TOKEN.
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          GH_REPO: ${{ github.repository }}
          # Verificador de codigo (fecha-zumbi): realChatRunner le LLM_API_KEY/LLM_BASE_URL
          # do ambiente; le o arquivo no head via getFileAtRef (sem download de context-pack).
          # VERIFY_MODEL e o modelo de RACIOCINIO (deepseek-v4-flash, nao Flash-Lite) — fallback
          # para DEDUP_MODEL. So roda quando ha thread zumbi + LLM + identidade que resolve.
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL || 'https://generativelanguage.googleapis.com/v1beta/openai' }}
          VERIFY_MODEL: deepseek/deepseek-v4-flash
        run: npx tsx lib/post.ts /tmp/verdict.json

  # Judge-pushback: caminho PARALELO ao pipeline, isolado por if. Reage ao dev RESPONDER
  # uma thread (pull_request_review_comment). Avalia o argumento; valido fecha P1/P2 (store),
  # nunca P0. Modelo de raciocinio (deepseek). Requer PAT/App (GITHUB_TOKEN nao resolve thread).
  judge-pushback:
    if: inputs.event == 'review_comment'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          repository: freeflowsoftware/movvia-ai-review
          ref: v1
          token: ${{ secrets.AI_REVIEW_REPO_TOKEN || github.token }}
      - run: npm i -g pnpm@9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --prefer-offline
      # Debounce: coalesce rajadas de replies. Com cancel-in-progress:false o sleep enfileira.
      - run: sleep 90
      - name: Julgar pushback
        env:
          REVIEW_APP_ID: ${{ secrets.REVIEW_APP_ID }}
          REVIEW_APP_PRIVATE_KEY: ${{ secrets.REVIEW_APP_PRIVATE_KEY }}
          REVIEW_INSTALLATION_ID: ${{ secrets.REVIEW_INSTALLATION_ID }}
          REVIEW_PAT: ${{ secrets.REVIEW_PAT }}
          AI_REVIEW_REPO_TOKEN: ${{ secrets.AI_REVIEW_REPO_TOKEN }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL || 'https://generativelanguage.googleapis.com/v1beta/openai' }}
          JUDGE_MODEL: deepseek/deepseek-v4-flash
          BOT_LOGIN: ${{ vars.BOT_LOGIN || 'movvia-ai-review[bot]' }}
          JUDGE_MAX_REPLIES: '3'
          PR_NUMBER: ${{ inputs.pr_number }}
          COMMENT_ID: ${{ inputs.comment_id }}
          GH_REPO: ${{ github.repository }}
        run: npx tsx lib/judge.ts
