name: AI Review
on:
  pull_request: { types: [opened, synchronize, reopened] }
  issue_comment: { types: [created] }
# A org desabilita write por DEFAULT no GITHUB_TOKEN; declarar permissions
# explicitamente no caller concede o que o reusable precisa (postar review + check run).
permissions:
  contents: read
  pull-requests: write
  checks: write
jobs:
  call:
    # Dogfooding: o movvia-ai-review revisa os proprios PRs via REFERENCIA LOCAL ao
    # reusable (./), evitando o startup_failure de reuso cross-repo `owner/repo@ref` em
    # repo privado. Os repos pe-* (cross-repo de verdade) usam @v1 no caller-template.yml.
    # FIX P0-seguranca: guard de fork no branch issue_comment (ver caller-template.yml).
    if: >-
      github.event_name == 'pull_request' ||
      (startsWith(github.event.comment.body, '/ai-review') &&
       github.event.issue.pull_request &&
       contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    uses: ./.github/workflows/ai-review.yml
    with:
      pr_number: ${{ github.event.pull_request.number || github.event.issue.number }}
      full_review: ${{ contains(github.event.comment.body, '--full') }}
    secrets: inherit
