name: AI Review
on:
  pull_request: { types: [opened, synchronize, reopened] }
  issue_comment: { types: [created] }
  pull_request_review_comment: { types: [created] }
# A org desabilita write por DEFAULT no GITHUB_TOKEN; declarar permissions
# explicitamente no caller concede o que o reusable precisa (postar review + check run).
permissions:
  contents: read
  pull-requests: write
  checks: write
jobs:
  call:
    # Dogfooding: o movvia-ai-review revisa os proprios PRs via REFERENCIA LOCAL ao
    # reusable (./), evitando o startup_failure de reuso cross-repo `owner/repo@ref` em
    # repo privado. Os repos pe-* (cross-repo de verdade) usam @v1 no caller-template.yml.
    # FIX P0-seguranca: guard de fork no branch issue_comment (ver caller-template.yml).
    # PED-2728: `/ai-review dismiss|undismiss` NAO cai aqui (job dismiss cuida) — senao o
    # pipeline rodaria em duplicidade com o job dismiss. As negacoes isolam o sub-comando.
    if: >-
      github.event_name == 'pull_request' ||
      (startsWith(github.event.comment.body, '/ai-review') &&
       !startsWith(github.event.comment.body, '/ai-review dismiss') &&
       !startsWith(github.event.comment.body, '/ai-review undismiss') &&
       github.event.issue.pull_request &&
       contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    uses: ./.github/workflows/ai-review.yml
    with:
      pr_number: ${{ github.event.pull_request.number || github.event.issue.number }}
      full_review: ${{ contains(github.event.comment.body, '--full') }}
    secrets: inherit

  dismiss:
    # PED-2728: /ai-review dismiss|undismiss <findingId> <motivo>. Mesmo fork-guard do call
    # (autor membro do repo + comentario em PR). Roda o pipeline com event=dismiss: o job
    # post aplica lib/dismiss.ts ANTES do post.ts, que recomputa o verdict.
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      (startsWith(github.event.comment.body, '/ai-review dismiss') ||
       startsWith(github.event.comment.body, '/ai-review undismiss')) &&
      contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    uses: ./.github/workflows/ai-review.yml
    with:
      pr_number: ${{ github.event.issue.number }}
      event: dismiss
      comment_id: ${{ github.event.comment.id }}
    secrets: inherit

  judge:
    # Dogfooding do judge-pushback (referencia local ao reusable). Mesmo fork-guard +
    # anti-loop (ignora reply com nosso marker) do caller-template.yml.
    if: >-
      github.event_name == 'pull_request_review_comment' &&
      github.event.comment.in_reply_to_id &&
      contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
      !contains(github.event.comment.body, 'movvia-ai-review:')
    uses: ./.github/workflows/ai-review.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
      event: review_comment
      comment_id: ${{ github.event.comment.id }}
    secrets: inherit
