name: AI Review
on:
  pull_request: { types: [opened, synchronize, reopened] }
  issue_comment: { types: [created] }
jobs:
  call:
    # Dogfooding: o movvia-ai-review revisa os proprios PRs chamando o reusable central
    # @v1 (mesmo caminho que os repos pe-* vao usar via caller-template.yml).
    # FIX P0-seguranca: guard de fork no branch issue_comment (ver caller-template.yml).
    if: >-
      github.event_name == 'pull_request' ||
      (startsWith(github.event.comment.body, '/ai-review') &&
       github.event.issue.pull_request &&
       contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    uses: freeflowsoftware/movvia-ai-review/.github/workflows/ai-review.yml@v1
    with:
      pr_number: ${{ github.event.pull_request.number || github.event.issue.number }}
      full_review: ${{ contains(github.event.comment.body, '--full') }}
    secrets: inherit
