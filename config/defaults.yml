# gatekeeper.adversarial_threshold E lido pelo entrypoint do gatekeeper (Task 15):
# editar este valor muda quais findings sobrevivem a etapa adversarial.
#
# llm.*: o runner real dos agentes e da etapa adversarial (realChatRunner em
# lib/run-agent.ts) faz chat-completion direta via fetch nativo, lendo {env:LLM_API_KEY}
# e {env:LLM_BASE_URL} direto do ambiente — nao ha mais opencode/opencode.json. O model
# default (gemini/gemini-flash-lite) e o id PURO do OpenRouter. paths_criticos segue como
# forward-reference (sem consumidor). base_url/model trocaveis por env/secret e por
# frontmatter do agente.
llm:
  default_model: "gemini/gemini-flash-lite"
  base_url_env: LLM_BASE_URL
  api_key_env: LLM_API_KEY
gatekeeper:
  adversarial_threshold: 0.8     # confianca minima (score/10) para manter finding
# verify.*: o verificador de correcao por codigo (lib/verify-fix.ts) confirma, lendo o
# arquivo no head, se um problema foi corrigido ANTES de fechar a thread. close_threshold
# = confianca minima (score/10) para fechar; max_threads_per_run = cap rigido de chamadas
# LLM por run (acima dele, preserva o excedente). P0 NUNCA fecha por aqui (vira reply).
verify:
  close_threshold: 0.9
  max_threads_per_run: 10
# judge.*: o judge-pushback avalia o ARGUMENTO textual do dev numa thread. model =
# modelo de RACIOCINIO (deepseek-v4-flash, nao Flash-Lite, que aceita retorica). max_replies
# = circuit-breaker (apos N replies nossas na thread, escala/para). bot_login = identidade
# usada no anti-loop (nao reage ao proprio reply). Lidos via env no entrypoint do judge.
judge:
  model: "deepseek/deepseek-v4-flash"
  max_replies: 3
  debounce_seconds: 90
  bot_login: "movvia-ai-review[bot]"
# context_pack.*: cotas do context-pack deterministico (lib/context-pack.ts), lidas pelo
# context-pack-cli. max_tokens e o cap rigido do pack inteiro (corte por prioridade
# alterado>irmaos>imports>exemplos); skeleton_loc_threshold skeletoniza arquivos grandes
# das camadas 2-4 (o alterado nunca). Editar estes valores muda o tamanho/escopo do pack.
context_pack:
  max_tokens: 100000
  max_siblings: 4
  max_imports: 6
  max_exemplars: 3
  skeleton_loc_threshold: 400
paths_criticos:                  # CODEOWNERS humano obrigatorio
  - "**/financeiro/**"
  - "pe-migrations/**"
# walkthrough.*: o gerador de walkthrough (lib/walkthrough-cli.ts) posta um comentario
# top-level com narrativa + tabela de camadas + diagramas Mermaid + esforço estimado.
# Usa Gemini Flash-Lite (barato/rapido): nao precisa de raciocinio profundo, so sumarizacao.
walkthrough:
  # ID no formato provider/modelo do OpenRouter. "gemini/gemini-flash-lite" retornava
  # HTTP 400 "is not a valid model ID" -> walkthrough sempre caia no fallback.
  model: "google/gemini-2.5-flash-lite"
