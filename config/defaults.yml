# gatekeeper.adversarial_threshold E lido pelo entrypoint do gatekeeper (Task 15):
# editar este valor muda quais findings sobrevivem a etapa adversarial.
#
# llm.*: o runner real dos agentes e da etapa adversarial (realChatRunner em
# lib/run-agent.ts) faz chat-completion direta via fetch nativo, lendo {env:LLM_API_KEY}
# e {env:LLM_BASE_URL} direto do ambiente — nao ha mais opencode/opencode.json. O model
# default (gemini/gemini-flash-lite) e o id PURO do OpenRouter. paths_criticos segue como
# forward-reference (sem consumidor). base_url/model trocaveis por env/secret e por
# frontmatter do agente.
llm:
  default_model: "gemini/gemini-flash-lite"
  base_url_env: LLM_BASE_URL
  api_key_env: LLM_API_KEY
gatekeeper:
  adversarial_threshold: 0.8     # confianca minima (score/10) para manter finding
# context_pack.*: cotas do context-pack deterministico (lib/context-pack.ts), lidas pelo
# context-pack-cli. max_tokens e o cap rigido do pack inteiro (corte por prioridade
# alterado>irmaos>imports>exemplos); skeleton_loc_threshold skeletoniza arquivos grandes
# das camadas 2-4 (o alterado nunca). Editar estes valores muda o tamanho/escopo do pack.
context_pack:
  max_tokens: 100000
  max_siblings: 4
  max_imports: 6
  max_exemplars: 3
  skeleton_loc_threshold: 400
paths_criticos:                  # CODEOWNERS humano obrigatorio
  - "**/financeiro/**"
  - "pe-migrations/**"
